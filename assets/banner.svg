<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="100%" stop-color="#1E1B4B" />
    </linearGradient>
    
    <!-- Text Gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>

    <!-- Node Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Dash Array Animation -->
    <style>
      .pulse-line {
        stroke-dasharray: 10, 15;
        animation: dash 30s linear infinite;
      }
      @keyframes dash {
        to {
          stroke-dashoffset: -1000;
        }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg-grad)" rx="12" />

  <!-- Grid Pattern -->
  <g opacity="0.1">
    <path d="M 0,20 L 800,20 M 0,40 L 800,40 M 0,60 L 800,60 M 0,80 L 800,80 M 0,100 L 800,100 M 0,120 L 800,120 M 0,140 L 800,140 M 0,160 L 800,160 M 0,180 L 800,180" stroke="#4B5563" stroke-width="0.5" />
    <path d="M 50,0 L 50,200 M 100,0 L 100,200 M 150,0 L 150,200 M 200,0 L 200,200 M 250,0 L 250,200 M 300,0 L 300,200 M 350,0 L 350,200 M 400,0 L 400,200 M 450,0 L 450,200 M 500,0 L 500,200 M 550,0 L 550,200 M 600,0 L 600,200 M 650,0 L 650,200 M 700,0 L 700,200 M 750,0 L 750,200" stroke="#4B5563" stroke-width="0.5" />
  </g>

  <!-- Title Text -->
  <text x="40" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="url(#text-grad)">Awesome Teacher-Student</text>
  <text x="40" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#E5E7EB" letter-spacing="1">Network Architecture</text>
  <text x="40" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#9CA3AF">Knowledge Distillation &amp; Compression Paradigm</text>

  <!-- Visualizing KD: Teacher Network (Left / Top right) and Student (Bottom right) -->
  <g transform="translate(480, 0)">
    <!-- Connections -->
    <!-- Teacher Layer 1 to Layer 2 -->
    <line x1="50" y1="60" x2="120" y2="40" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6" />
    <line x1="50" y1="60" x2="120" y2="100" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6" />
    <line x1="50" y1="140" x2="120" y2="100" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6" />
    <line x1="50" y1="140" x2="120" y2="160" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6" />

    <!-- Teacher Layer 2 to Layer 3 (Output) -->
    <line x1="120" y1="40" x2="190" y2="70" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6" />
    <line x1="120" y1="100" x2="190" y2="70" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6" />
    <line x1="120" y1="100" x2="190" y2="130" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6" />
    <line x1="120" y1="160" x2="190" y2="130" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6" />

    <!-- Distillation Bridge (Teacher Outputs to Student Outputs) -->
    <!-- Animated pulse lines representing dark knowledge transfer -->
    <path d="M 190,70 Q 230,85 270,100" fill="none" stroke="#EC4899" stroke-width="2.5" class="pulse-line" filter="url(#glow)" />
    <path d="M 190,130 Q 230,120 270,110" fill="none" stroke="#EC4899" stroke-width="2.5" class="pulse-line" filter="url(#glow)" />

    <!-- Student Network -->
    <line x1="270" y1="100" x2="310" y2="105" stroke="#3B82F6" stroke-width="1.5" opacity="0.8" />
    <line x1="270" y1="110" x2="310" y2="105" stroke="#3B82F6" stroke-width="1.5" opacity="0.8" />

    <!-- Nodes (Teacher) -->
    <circle cx="50" cy="60" r="6" fill="#3B82F6" />
    <circle cx="50" cy="140" r="6" fill="#3B82F6" />
    
    <circle cx="120" cy="40" r="6" fill="#8B5CF6" />
    <circle cx="120" cy="100" r="6" fill="#8B5CF6" />
    <circle cx="120" cy="160" r="6" fill="#8B5CF6" />

    <!-- Teacher Output Nodes (Large) -->
    <circle cx="190" cy="70" r="9" fill="#EC4899" filter="url(#glow)" />
    <circle cx="190" cy="130" r="9" fill="#EC4899" filter="url(#glow)" />
    
    <!-- Student Nodes -->
    <!-- Student Input (smaller, matching teacher logits) -->
    <circle cx="270" cy="100" r="5" fill="#10B981" filter="url(#glow)" />
    <circle cx="270" cy="110" r="5" fill="#10B981" filter="url(#glow)" />
    <!-- Student Output -->
    <circle cx="310" cy="105" r="7" fill="#3B82F6" filter="url(#glow)" />

    <!-- Text Labels -->
    <text x="190" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#EC4899" text-anchor="middle">TEACHER</text>
    <text x="310" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#3B82F6" text-anchor="middle">STUDENT</text>
    <text x="240" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#10B981" text-anchor="middle">DISTILLATION</text>
  </g>
</svg>
